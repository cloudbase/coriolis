- config:
    instance: instance_1
    task_info:
      osmorphing_info: {}
      osmorphing_connection_info:
        info1: value1
        info2: value2
  expected_instance_scripts: ~

- config:
    instance: instance_1
    task_info:
      osmorphing_info: {}
      osmorphing_connection_info:
        info1: value1
        info2: value2
      user_scripts:
        instances:
          instance_1: instance_script1
  expected_instance_scripts:
    - phase: osmorphing_post_os_mount
      payload: instance_script1

- config:
    instance: instance_1
    task_info:
      osmorphing_info:
        os_type: linux
      osmorphing_connection_info:
        info1: value1
        info2: value2
      user_scripts:
        global:
          linux:
            - phase: osmorphing_pre_os_mount
              payload: instance_script1
            - phase: osmorphing_pre_os_mount
              payload: instance_script2
            - phase: osmorphing_post_os_mount
              payload: instance_script3
  expected_instance_scripts:
    - phase: osmorphing_pre_os_mount
      payload: instance_script1
    - phase: osmorphing_pre_os_mount
      payload: instance_script2
    - phase: osmorphing_post_os_mount
      payload: instance_script3

- config:
    instance: instance_1
    task_info:
      osmorphing_info: {}
      osmorphing_connection_info:
        info1: value1
        info2: value2
      user_scripts:
        global:
          linux: linux_script1
  expected_instance_scripts: ~

- config:
    instance: instance_1
    task_info:
      osmorphing_info:
        os_type: linux
      osmorphing_connection_info:
        info1: value1
        info2: value2
      user_scripts: {}
  expected_instance_scripts: ~

- config:
    instance: instance_1
    task_info:
      osmorphing_info:
        os_type: linux
      osmorphing_connection_info:
        info1: value1
        info2: value2
      user_scripts:
        global:
          windows: windows_script1
  expected_instance_scripts: ~
